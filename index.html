  <body>
    <div
      style="
        min-height: 100vh;
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #cfd6df;
        color: #222;
      "
    >
      <div
        style="
          background: linear-gradient(#4f81bd, #355f9c);
          color: white;
          padding: 14px 20px;
          font-size: 20px;
          font-weight: bold;
          border-bottom: 3px solid #2c4f82;
        "
      >
        LXD Systems
      </div>

      <div
        style="
          width: 640px;
          margin: 60px auto;
          background: #ffffff;
          border: 1px solid #9aa7b4;
          box-shadow: 0 0 8px rgba(0, 0, 0, 0.2);
        "
      >
        <div
          style="
            background: #e9edf2;
            padding: 16px;
            border-bottom: 1px solid #b7c0cb;
            font-size: 18px;
            font-weight: bold;
          "
        >
          Class Authorization Portal
        </div>

        <div style="padding: 24px">
          <p>
            Please enter your class or teacher authorization code to access
            restricted resources.
          </p>

          <label
            for="auth"
            style="display: block; margin-bottom: 6px; font-weight: bold"
          >
            Authorization Code
          </label>

          <input
            id="auth"
            type="text"
            style="
              width: 100%;
              padding: 8px;
              font-size: 14px;
              border: 1px solid #7f9db9;
            "
          />

          <button
            style="
              margin-top: 18px;
              padding: 8px 16px;
              font-size: 14px;
              background: linear-gradient(#f0f0f0, #cfcfcf);
              border: 1px solid #7f7f7f;
              cursor: pointer;
            "
          >
            Continue
          </button>

          <div style="margin-top: 20px; font-size: 12px; color: #555">
            Unauthorized access is prohibited.
          </div>
        </div>

        <div
          style="
            background: #e9edf2;
            border-top: 1px solid #b7c0cb;
            padding: 10px;
            font-size: 11px;
            color: #555;
            text-align: center;
          "
        >
          © 2011–2013 LXD Learning Systems
        </div>
      </div>
    </div>
